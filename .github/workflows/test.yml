name: test
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod tidy && git diff --exit-code go.mod && (test ! -f go.sum || git diff --exit-code go.sum)
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...
